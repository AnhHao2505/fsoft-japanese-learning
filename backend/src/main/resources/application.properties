server.port=8080
spring.application.name=japanese-learning

# PostgreSQL Database
spring.datasource.url=jdbc:postgresql://localhost:5432/japanese_learning
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=false
spring.jpa.open-in-view=true

# Flyway Migration
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# JWT Configuration
app.jwt.secret=dGhpc0lzQVZlcnlTZWN1cmVKV1RTZWNyZXRLZXlGb3JKYXBhbmVzZUxlYXJuaW5nQXBwMjAyNg==
app.jwt.expiration=86400000

# CORS
spring.web.cors.allowed-origins=http://localhost:5173
